    <script>
        // ===== 同步資料夾 IndexedDB 輔助 =====
        const SYNC_DB_NAME = 'TodoMasterSync';
        const SYNC_DB_STORE = 'dirHandle';

        function openSyncDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(SYNC_DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(SYNC_DB_STORE);
                req.onsuccess = e => resolve(e.target.result);
                req.onerror = e => reject(e.target.error);
            });
        }

        async function saveDirHandle(handle) {
            const db = await openSyncDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(SYNC_DB_STORE, 'readwrite');
                tx.objectStore(SYNC_DB_STORE).put(handle, 'syncFolder');
                tx.oncomplete = () => resolve();
                tx.onerror = e => reject(e.target.error);
            });
        }

        async function loadDirHandle() {
            const db = await openSyncDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(SYNC_DB_STORE, 'readonly');
                const req = tx.objectStore(SYNC_DB_STORE).get('syncFolder');
                req.onsuccess = e => resolve(e.target.result || null);
                req.onerror = e => reject(e.target.error);
            });
        }

        async function clearDirHandle() {
            const db = await openSyncDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(SYNC_DB_STORE, 'readwrite');
                tx.objectStore(SYNC_DB_STORE).delete('syncFolder');
                tx.oncomplete = () => resolve();
                tx.onerror = e => reject(e.target.error);
            });
        }

        // ===== 數據模型 =====
        class TodoApp {
            constructor() {
                this.tasks = [];
                this.tags = [];
                this.currentFilter = 'all';
                this.sortMode = 'drag'; // 'drag' 或 'fixed'
                this.showCompleted = true;
                this.currentEditingTask = null;


                this.init();
            }

            init() {
                try {
                    this.loadFromStorage();
                    this.setupEventListeners();
                    this.setupBackupListeners();
                    this.updateUI();
                    this.updateDate();
                    setInterval(() => this.updateDate(), 60000);
                    this.autoImportFromSyncFolder();
                } catch (e) {
                    console.error('初始化失敗:', e);
                    this.showNotification('⚠️ 初始化失敗：' + e.message);
                }
            }

            // ===== 數據管理 =====
            loadFromStorage() {
                try {
                    const tasksJson = localStorage.getItem('todoTasks');
                    const tagsJson = localStorage.getItem('todoTags');
                    const sortModeJson = localStorage.getItem('todoSortMode');

                    this.tasks = tasksJson ? JSON.parse(tasksJson) : [];
                    this.tags = tagsJson ? JSON.parse(tagsJson) : [];
                    this.sortMode = sortModeJson ? JSON.parse(sortModeJson) : 'drag';
                    const showCompletedJson = localStorage.getItem('todoShowCompleted');
                    this.showCompleted = showCompletedJson !== null ? JSON.parse(showCompletedJson) : true;
                } catch (e) {
                    console.error('載入數據失敗:', e);
                    this.showNotification('⚠️ 載入數據失敗');
                }
            }

            saveToStorage() {
                try {
                    localStorage.setItem('todoTasks', JSON.stringify(this.tasks));
                    localStorage.setItem('todoTags', JSON.stringify(this.tags));
                    localStorage.setItem('todoSortMode', JSON.stringify(this.sortMode));
                    localStorage.setItem('todoShowCompleted', JSON.stringify(this.showCompleted));
                    // 注意：todoSyncDate 僅在匯入/匯出同步時更新，不在一般存檔時覆蓋
                } catch (e) {
                    console.error('保存數據失敗:', e);
                    this.showNotification('⚠️ 保存數據失敗');
                }
            }

            // ===== 任務操作 =====
            addTask(taskData) {
                const task = {
                    id: Date.now().toString(),
                    ...taskData,
                    completed: false,
                    completedAt: null,
                    order: this.tasks.length
                };
                this.tasks.push(task);
                this.saveToStorage();
                return task;
            }

            updateTask(id, updates) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    Object.assign(task, updates);
                    if (updates.completed && !task.completedAt) {
                        task.completedAt = new Date().toISOString();
                        task.completedDate = localDateStr();
                    }
                    this.saveToStorage();
                }
            }

            deleteTask(id) {
                this.tasks = this.tasks.filter(t => t.id !== id);
                this.saveToStorage();
            }

            getTaskById(id) {
                return this.tasks.find(t => t.id === id);
            }

            // ===== 標籤管理 =====
            addTag(name) {
                if (!this.tags.find(t => t === name)) {
                    this.tags.push(name);
                    this.saveToStorage();
                }
            }

            // ===== 過濾和排序 =====
            getFilteredTasks() {
                let filtered = [...this.tasks];

                if (this.currentFilter.startsWith('category:')) {
                    const category = this.currentFilter.split(':')[1];
                    filtered = filtered.filter(t => t.category === category);
                } else if (this.currentFilter.startsWith('tag:')) {
                    const tag = this.currentFilter.split(':')[1];
                    filtered = filtered.filter(t => t.tags && t.tags.includes(tag));
                } else if (this.currentFilter.startsWith('group:')) {
                    const groupId = this.currentFilter.split(':')[1];
                    filtered = filtered.filter(t => t.groupId === groupId);
                }

                if (!this.showCompleted) {
                    filtered = filtered.filter(t => !t.completed);
                }

                // 置頂/置底：在同一天內永遠排最前/最後
                const pinRank = t => t.pinned === 'top' ? -1 : t.pinned === 'bottom' ? 1 : 0;

                // 排序：群組視圖按 groupOrder；固定模式按手動 order；拖曳模式按日期
                if (this.currentFilter.startsWith('group:')) {
                    filtered.sort((a, b) => {
                        if (a.completed !== b.completed) return a.completed ? 1 : -1;
                        return (a.groupOrder ?? 999) - (b.groupOrder ?? 999);
                    });
                } else if (this.sortMode === 'fixed') {
                    filtered.sort((a, b) => {
                        if (a.completed !== b.completed) return a.completed ? 1 : -1;
                        const pr = pinRank(a) - pinRank(b);
                        if (pr !== 0) return pr;
                        return (a.order ?? 9999) - (b.order ?? 9999);
                    });
                } else {
                    filtered.sort((a, b) => {
                        if (a.completed !== b.completed) return a.completed ? 1 : -1;
                        if (a.date && b.date) {
                            const d = new Date(a.date) - new Date(b.date);
                            if (d !== 0) return d;
                            const pr = pinRank(a) - pinRank(b);
                            if (pr !== 0) return pr;
                        }
                        return (a.order ?? 9999) - (b.order ?? 9999);
                    });
                }

                return filtered;
            }

            // ===== UI 更新 =====
            updateUI() {
                this.renderGroups();
                this.renderTags();
                this.renderTasks();
                this.updateStats();
                this.updateSortModeButton();
                this.updateShowCompletedButton();
            }

            renderTags() {
                const tagContainer = document.getElementById('tagContainer');
                tagContainer.innerHTML = '';

                this.tags.forEach(tag => {
                    const tagEl = document.createElement('button');
                    tagEl.className = 'tag-item';
                    if (this.currentFilter === `tag:${tag}`) {
                        tagEl.classList.add('active');
                    }
                    tagEl.textContent = tag;
                    tagEl.onclick = (e) => {
                        e.preventDefault();
                        this.currentFilter = this.currentFilter === `tag:${tag}` ? 'all' : `tag:${tag}`;
                        this.renderTags();
                        this.renderTasks();
                    };
                    tagContainer.appendChild(tagEl);
                });

                // 更新模態框中的標籤複選框
                const tagCheckboxes = document.getElementById('tagCheckboxes');
                tagCheckboxes.innerHTML = '';

                this.tags.forEach(tag => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-item';

                    const input = document.createElement('input');
                    input.type = 'checkbox';
                    input.value = tag;
                    input.className = 'tag-checkbox';

                    if (this.currentEditingTask && this.currentEditingTask.tags && this.currentEditingTask.tags.includes(tag)) {
                        input.checked = true;
                    }

                    label.appendChild(input);
                    label.appendChild(document.createTextNode(tag));
                    tagCheckboxes.appendChild(label);
                });
            }

            renderTasks() {
                const taskList = document.getElementById('taskList');
                const emptyState = document.getElementById('emptyState');

                const filtered = this.getFilteredTasks();

                if (filtered.length === 0) {
                    taskList.innerHTML = '';
                    emptyState.style.display = 'flex';
                    return;
                }

                emptyState.style.display = 'none';
                taskList.innerHTML = '';

                // 三區塊視圖：僅 'all' filter
                const isSectionView = this.currentFilter === 'all';
                let sectionOverdueList = null, sectionTodayList = null, sectionTomorrowList = null, sectionDayAfterList = null, sectionLaterList = null;
                const todayStr = localDateStr();
                const todayMidnight = getTodayMidnight();
                const tomorrowDate = new Date(); tomorrowDate.setDate(tomorrowDate.getDate() + 1);
                const tomorrowStr = localDateStr(tomorrowDate);
                const dayAfterDate = new Date(); dayAfterDate.setDate(dayAfterDate.getDate() + 2);
                const dayAfterStr = localDateStr(dayAfterDate);
                if (isSectionView) {
                    taskList.innerHTML = `
                        <div class="time-section" id="section-overdue" data-section="overdue">
                            <div class="time-section-header">⚠️ 逾期
                                <button class="reschedule-all-btn" id="rescheduleAllBtn">📅 全部重新安排到今天</button>
                            </div>
                            <ol class="task-list section-task-list" id="taskList-overdue"></ol>
                        </div>
                        <div class="time-section" id="section-today" data-section="today">
                            <div class="time-section-header">📅 今天<span class="section-time-total" id="section-today-total"></span></div>
                            <ol class="task-list section-task-list" id="taskList-today"></ol>
                        </div>
                        <div class="time-section" id="section-tomorrow" data-section="tomorrow">
                            <div class="time-section-header">🌅 明天<span class="section-time-total" id="section-tomorrow-total"></span></div>
                            <ol class="task-list section-task-list" id="taskList-tomorrow"></ol>
                        </div>
                        <div class="time-section" id="section-dayafter" data-section="dayafter">
                            <div class="time-section-header">🌤️ 後天<span class="section-time-total" id="section-dayafter-total"></span></div>
                            <ol class="task-list section-task-list" id="taskList-dayafter"></ol>
                        </div>
                        <div class="time-section" id="section-later" data-section="later">
                            <div class="time-section-header">🗓️ 更久以後</div>
                            <ol class="task-list section-task-list" id="taskList-later"></ol>
                        </div>
                    `;
                    sectionOverdueList = document.getElementById('taskList-overdue');
                    sectionTodayList = document.getElementById('taskList-today');
                    sectionTomorrowList = document.getElementById('taskList-tomorrow');
                    sectionDayAfterList = document.getElementById('taskList-dayafter');
                    sectionLaterList = document.getElementById('taskList-later');

                    // dragover on section containers for cross-section dragging
                    [
                        { el: sectionOverdueList, sec: 'overdue' },
                        { el: sectionTodayList, sec: 'today' },
                        { el: sectionTomorrowList, sec: 'tomorrow' },
                        { el: sectionDayAfterList, sec: 'dayafter' },
                        { el: sectionLaterList, sec: 'later' }
                    ].forEach(({ el }) => {
                        el.addEventListener('dragover', (e) => {
                            e.preventDefault();
                            const draggingEl = document.querySelector('.task-item.dragging');
                            if (!draggingEl) return;
                            const after = this.getDragAfterElement(el, e.clientY);
                            if (after == null) el.appendChild(draggingEl);
                            else el.insertBefore(draggingEl, after);
                        });
                    });

                    const rescheduleAllBtn = document.getElementById('rescheduleAllBtn');
                    if (rescheduleAllBtn) {
                        rescheduleAllBtn.addEventListener('click', () => {
                            const overdueTasks = this.tasks.filter(t => isTaskOverdue(t, todayMidnight));
                            const affectedGroupIds = new Set();
                            overdueTasks.forEach(t => {
                                this.updateTask(t.id, { date: todayStr });
                                if (t.groupId && t.groupDelayMode === 'auto') {
                                    affectedGroupIds.add(t.groupId);
                                }
                            });
                            affectedGroupIds.forEach(groupId => this.updateGroupTaskDates(groupId));
                            if (overdueTasks.length > 0) {
                                this.showNotification(`📅 已將 ${overdueTasks.length} 個逾期任務重新安排到今天`);
                                this.updateUI();
                            }
                        });
                    }
                }

                let todayMinutes = 0, tomorrowMinutes = 0, dayAfterMinutes = 0;
                let todayCompletedMinutes = 0, tomorrowCompletedMinutes = 0, dayAfterCompletedMinutes = 0;

                // 已預定/完成時數統計一律以 this.tasks 計算，不受「顯示/隱藏已完成」篩選影響
                if (isSectionView) {
                    this.tasks.forEach(task => {
                        // 已壓縮任務一律視為已完成，且無逾期疑慮；缺少 date 的舊壓縮資料以 completedDate 近似定位
                        const bucketDate = task.date || (task.compressed ? task.completedDate : null);
                        if (isTaskOverdue(task, todayMidnight)) return;
                        if (bucketDate === todayStr) {
                            todayMinutes += getTaskPlannedMinutes(task);
                            if (task.completed) todayCompletedMinutes += getTaskPlannedMinutes(task);
                        } else if (bucketDate === tomorrowStr) {
                            tomorrowMinutes += getTaskPlannedMinutes(task);
                            if (task.completed) tomorrowCompletedMinutes += getTaskPlannedMinutes(task);
                        } else if (bucketDate === dayAfterStr) {
                            dayAfterMinutes += getTaskPlannedMinutes(task);
                            if (task.completed) dayAfterCompletedMinutes += getTaskPlannedMinutes(task);
                        }
                    });
                }

                filtered.forEach(task => {
                    // 壓縮任務：不顯示卡片，只在時間統計呈現
                    if (task.compressed) return;

                    const li = document.createElement('li');
                    li.className = 'task-item fade-in';
                    if (task.completed) li.classList.add('completed');

                    // 群組視圖一律可拖曳；其他視圖依 sortMode
                    const isDraggable = this.sortMode === 'drag' || this.currentFilter.startsWith('group:');
                    if (isDraggable) {
                        li.classList.add('sortable');
                        li.draggable = true;
                    } else {
                        li.draggable = false;
                    }

                    // 根據預計時間添加顏色編碼
                    li.classList.add(`time-${task.estimatedTime}`);

                    li.dataset.taskId = task.id;

                    const dueStatus = this.getTaskDueStatus(task);

                    // 計算預計時間顯示
                    let estimatedDisplay = TIME_META[task.estimatedTime]?.label;
                    if (task.estimatedTime === '30plus' && task.blocks) {
                        estimatedDisplay = `${task.blocks} blocks (${task.blocks * BLOCK_MINUTES}分鐘)`;
                    }

                    let html = `
                        <div class="task-header">
                            <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                            ${task.pinned ? `<span class="task-pin-icon" title="${task.pinned === 'top' ? '已置頂' : '已置底'}">📌</span>` : ''}
                            <span class="task-title">${this.escapeHtml(task.title)}</span>
                            <div class="task-badges">
                                <span class="task-category ${task.category}">
                                    ${CATEGORY_META[task.category]?.emoji} ${task.category}
                                </span>
                                ${task.tags && task.tags.length > 0 ? `
                                    <div class="task-tags">
                                        ${task.tags.map(tag => `<span class="task-tag">${this.escapeHtml(tag)}</span>`).join('')}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                        <div class="task-content">
                            ${task.description ? `<div class="task-description">${this.escapeHtml(task.description)}</div>` : ''}
                            <div class="task-meta">
                                ${task.date ? `<div class="task-meta-item">📅 ${task.date}${dueStatus.label ? ` <span style="color: ${dueStatus.color}">${dueStatus.label}</span>` : ''}</div>` : ''}
                                <div class="task-meta-item">${TIME_META[task.estimatedTime]?.emoji} ${estimatedDisplay}</div>
                                ${task.actualTime ? `<div class="task-meta-item">✓ ${task.actualTime}分鐘</div>` : ''}
                                ${task.recurring && task.recurring.enabled ? `<div class="task-meta-item">🔁 每${task.recurring.interval}天${task.recurring.repeatCount ? ` 共${task.recurring.repeatCount}次` : task.recurring.untilDate ? ` 至 ${task.recurring.untilDate}` : ''}${task.recurring.completedCount ? ` · 已完成${task.recurring.completedCount}次` : ''}</div>` : ''}
                            </div>
                            ${task.nextStepNotes ? `
                                <div style="margin-top: 8px; padding: 8px; background-color: var(--bg-tertiary); border-radius: 4px; border-left: 3px solid var(--accent-primary); font-size: 0.85rem; color: var(--text-secondary);">
                                    <strong>💡 下一步：</strong> ${this.escapeHtml(task.nextStepNotes)}
                                </div>
                            ` : ''}
                            ${task.blocks && task.blocks > 1 ? `
                                <div class="task-progress">
                                    <div class="task-blocks" data-task-id="${task.id}">
                                        ${Array.from({length: task.blocks}, (_, i) => `
                                            <div class="task-block ${i < (task.completedBlocks || 0) ? 'completed' : ''}"
                                                 data-block-index="${i}"
                                                 title="Block ${i + 1}/${task.blocks}"></div>
                                        `).join('')}
                                    </div>
                                    <div class="task-progress-text">${task.completedBlocks || 0}/${task.blocks}</div>
                                </div>
                            ` : ''}
                            ${dueStatus.label === '逾期' && !task.completed ? `
                                <button class="reschedule-today-btn">📅 重新安排到今天</button>
                            ` : ''}
                        </div>
                    `;

                    li.innerHTML = html;

                    // 添加事件監聽
                    const checkbox = li.querySelector('.task-checkbox');
                    checkbox.addEventListener('change', (e) => {
                        e.stopPropagation(); // 防止觸發點擊編輯

                        if (checkbox.checked && !task.completed && !task.actualTime) {
                            // 完成任務但未設置實際時間，詢問用戶
                            // 如果有 blocks，先完成所有剩餘的 blocks
                            let updates = { completed: true };
                            if (task.blocks && task.completedBlocks < task.blocks) {
                                updates.completedBlocks = task.blocks;
                            }

                            this.updateTask(task.id, updates);
                            this.updateUI();  // ✅ 重新渲染任務列表，使任務立即變為半透明

                            if (task.estimatedTime === 'non-continuous') {
                                this.completeNonContinuousTask(task.id);
                                return;
                            }

                            this.openCompleteTimeModal(task.id, checkbox);
                        } else if (checkbox.checked) {
                            // 已設置時間或已完成過，直接更新
                            let updates = { completed: true };
                            if (task.blocks && task.completedBlocks < task.blocks) {
                                updates.completedBlocks = task.blocks;
                            }
                            this.updateTask(task.id, updates);
                            // 迴圈任務：若尚未建立下一次副本，補充建立
                            if (task.recurring && task.recurring.enabled && !task.recurringCreated) {
                                this.createNextRecurringTask(task);
                            }
                            this.updateUI();
                        } else {
                            // 取消完成
                            this.updateTask(task.id, { completed: false });
                            this.updateUI();
                        }
                    });

                    // 添加拖動事件（drag 模式或群組視圖均可拖曳）
                    if (isDraggable) {
                        li.addEventListener('dragstart', (e) => {
                            e.dataTransfer.effectAllowed = 'move';
                            li.classList.add('dragging');
                        });

                        li.addEventListener('dragend', () => {
                            li.classList.remove('dragging');
                        });

                        li.addEventListener('dragover', (e) => {
                            e.preventDefault();
                            e.dataTransfer.dropEffect = 'move';
                            // 使用 li 目前所在的 ol 作為容器（支援三區塊跨段拖曳）
                            const container = li.closest('ol') || taskList;
                            const draggingElement = document.querySelector('.task-item.dragging');
                            if (!draggingElement) return;
                            const afterElement = this.getDragAfterElement(container, e.clientY);
                            if (afterElement == null) {
                                container.appendChild(draggingElement);
                            } else {
                                container.insertBefore(draggingElement, afterElement);
                            }
                        });
                    }

                    // 塊點擊事件
                    if (task.blocks && task.blocks > 1) {
                        const blocks = li.querySelectorAll('.task-block');
                        blocks.forEach((block, index) => {
                            block.addEventListener('click', (e) => {
                                e.stopPropagation();
                                // 切換該塊的完成狀態
                                const completedBlocks = task.completedBlocks || 0;
                                if (index < completedBlocks) {
                                    // 取消該塊
                                    const canceledTime = (task.blockTimes || [])[completedBlocks - 1] || 0;
                                    this.updateTask(task.id, {
                                        completedBlocks: completedBlocks - 1,
                                        actualTime: Math.max(0, (task.actualTime || 0) - canceledTime)
                                    });
                                } else if (index === completedBlocks) {
                                    // 完成該塊：開啟 block 時間記錄 modal
                                    const newCompleted = completedBlocks + 1;
                                    this.openBlockTimeModal(task.id, index, newCompleted);
                                    return; // updateUI 由 modal 內部處理
                                }
                                this.updateUI();
                            });
                        });
                    }

                    // 重新安排到今天按鈕
                    const rescheduleBtn = li.querySelector('.reschedule-today-btn');
                    if (rescheduleBtn) {
                        rescheduleBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const todayStr = localDateStr();
                            this.updateTask(task.id, { date: todayStr });
                            if (task.groupId && task.groupDelayMode === 'auto') {
                                this.updateGroupTaskDates(task.groupId);
                            }
                            this.showNotification('📅 已重新安排到今天');
                            this.updateUI();
                        });
                    }

                    // 點擊編輯（除了塊和複選框外）
                    li.addEventListener('click', (e) => {
                        if (!e.target.classList.contains('task-block') && e.target !== checkbox && !e.target.classList.contains('reschedule-today-btn')) {
                            this.openEditModal(task.id);
                        }
                    });

                    // 三區塊模式：依日期分配至對應 section list
                    if (isSectionView) {
                        if (isTaskOverdue(task, todayMidnight)) {
                            sectionOverdueList.appendChild(li);
                        } else if (task.date === todayStr) {
                            sectionTodayList.appendChild(li);
                        } else if (task.date === tomorrowStr) {
                            sectionTomorrowList.appendChild(li);
                        } else if (task.date === dayAfterStr) {
                            sectionDayAfterList.appendChild(li);
                        } else {
                            sectionLaterList.appendChild(li);
                        }
                    } else {
                        taskList.appendChild(li);
                    }
                });

                if (isSectionView) {
                    [
                        { id: 'section-today-total', total: todayMinutes, completed: todayCompletedMinutes },
                        { id: 'section-tomorrow-total', total: tomorrowMinutes, completed: tomorrowCompletedMinutes },
                        { id: 'section-dayafter-total', total: dayAfterMinutes, completed: dayAfterCompletedMinutes }
                    ].forEach(({ id, total, completed }) => {
                        const el = document.getElementById(id);
                        if (el) el.textContent = total > 0 ? `（已預定${formatDuration(total)}，完成${formatDuration(completed)}，剩餘${formatDuration(total - completed)}）` : '';
                    });
                }

                // 區塊無任務時隱藏
                if (isSectionView) {
                    ['overdue', 'today', 'tomorrow', 'dayafter', 'later'].forEach(sec => {
                        const section = document.getElementById(`section-${sec}`);
                        const list = document.getElementById(`taskList-${sec}`);
                        if (section && list) section.style.display = list.children.length === 0 ? 'none' : '';
                    });
                }

                // drop 監聽器統一由 setupEventListeners 處理，此處不重複綁定
            }

            getTaskDueStatus(task) {
                if (!task.date || task.completed) return { label: '', color: '' };

                const taskDate = dateAtMidnight(task.date);
                if (!taskDate) {
                    return { label: '不限期', color: '#808080' };
                }
                const today = getTodayMidnight();

                const diff = taskDate.getTime() - today.getTime();
                const dayMs = 24 * 60 * 60 * 1000;

                if (diff < 0)           return { label: '逾期', color: '#ff6b6b' };
                if (diff === 0)         return { label: '今天', color: '#ffd43b' };
                if (diff === dayMs)     return { label: '明天', color: '#a78bfa' };
                if (diff === 2 * dayMs) return { label: '後天', color: '#34d399' };

                return { label: '', color: '' };
            }

            getDragAfterElement(container, y) {
                const draggableElements = [...container.querySelectorAll('.task-item:not(.dragging)')];
                return draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = y - box.top - box.height / 2;

                    if (offset < 0 && offset > closest.offset) {
                        return { offset: offset, element: child };
                    } else {
                        return closest;
                    }
                }, { offset: Number.NEGATIVE_INFINITY }).element;
            }

            saveTaskOrder() {
                // 三區塊視圖下從各 section list 收集任務
                const isSectionView = this.currentFilter === 'all' && document.querySelector('.section-task-list');
                const taskItems = isSectionView
                    ? document.querySelectorAll('.section-task-list .task-item')
                    : document.querySelectorAll('#taskList .task-item');
                const isGroupView = this.currentFilter.startsWith('group:');
                const groupId = isGroupView ? this.currentFilter.split(':')[1] : null;

                taskItems.forEach((item, index) => {
                    const taskId = item.dataset.taskId;
                    const task = this.getTaskById(taskId);
                    if (task) {
                        task.order = index;
                        if (isGroupView && task.groupId === groupId) {
                            task.groupOrder = index + 1;
                        }
                    }
                });

                this.saveToStorage();

                if (isGroupView && groupId) {
                    this.updateGroupTaskDates(groupId);
                    this.showNotification('✅ 群組順序已更新，日期已重新計算');
                }
            }

            updateStats() {
                const statsContainer = document.getElementById('statsContainer');
                const allTasks = this.tasks.filter(t => !t.compressed);
                const todayStr = localDateStr();
                const todayMidnight = getTodayMidnight();

                const stats = {
                    total: allTasks.length,
                    completed: allTasks.filter(t => t.completed).length,
                    today: allTasks.filter(t => t.date === todayStr).length,
                    overdue: allTasks.filter(t => isTaskOverdue(t, todayMidnight)).length
                };

                statsContainer.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${stats.total}</div>
                        <div class="stat-label">總任務</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.completed}</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${stats.today}</div>
                        <div class="stat-label">今天</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #ff6b6b;">${stats.overdue}</div>
                        <div class="stat-label">逾期</div>
                    </div>
                `;
            }

            updateDate() {
                const dateDisplay = document.getElementById('dateDisplay');
                const versionDisplay = document.getElementById('versionDisplay');
                if (!dateDisplay) return;
                const now = new Date();
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                const formatted = now.toLocaleDateString('zh-TW', options);
                dateDisplay.textContent = formatted;
                if (versionDisplay) versionDisplay.textContent = APP_VERSION;
            }

            updateSortModeButton() {
                const btn = document.getElementById('toggleSortBtn');
                const text = document.getElementById('sortModeText');
                if (!text) return;
                text.textContent = this.sortMode === 'drag' ? '拖曳排序' : '固定排序';
            }

            updateShowCompletedButton() {
                const text = document.getElementById('completedVisibilityText');
                if (!text) return;
                text.textContent = this.showCompleted ? '顯示已完成' : '隱藏已完成';
            }


            // ===== 工具函數 =====
            escapeHtml(text) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return text.replace(/[&<>"']/g, m => map[m]);
            }

            showNotification(message) {
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                document.body.appendChild(notification);

                setTimeout(() => {
                    notification.remove();
                }, 3000);
            }

            // ===== 事件設置 =====
            setupEventListeners() {
                // 新增任務
                document.getElementById('addTaskBtn').addEventListener('click', () => {
                    this.currentEditingTask = null;
                    this.openModal('taskModal', '新增任務');
                    document.getElementById('taskForm').reset();
                    document.getElementById('deleteTaskBtn').style.display = 'none';
                    document.getElementById('duplicateTaskBtn').style.display = 'none';
                    document.getElementById('actualTimeGroup').style.display = 'none';
                    document.getElementById('taskRecurring').checked = false;
                    document.getElementById('recurringOptions').style.display = 'none';
                    document.getElementById('taskGroup').checked = false;
                    document.getElementById('groupOptions').style.display = 'none';

                    // 設置日期默認為今天並選中「具體日期」模式
                    const today = localDateStr();
                    document.querySelector('input[name="dateMode"][value="scheduled"]').checked = true;
                    document.getElementById('taskDate').value = today;
                    document.getElementById('taskDate').style.display = 'block';

                    // 設置預計時間為 10min 並隱藏 block 選擇
                    document.querySelector('input[name="estimatedTime"][value="10min"]').checked = true;
                    document.getElementById('blockSelectGroup').style.display = 'none';

                    // 預設任務類型為 goal
                    document.querySelector('input[name="taskType"][value="goal"]').checked = true;
                });

                // 提交任務表單
                document.getElementById('taskForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.saveTask();
                    closeModal('taskModal');
                });

                // 預計時間選項
                document.querySelectorAll('input[name="estimatedTime"]').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        const blockSelectGroup = document.getElementById('blockSelectGroup');
                        blockSelectGroup.style.display = e.target.value === '30plus' ? 'block' : 'none';
                    });
                });

                // Block 數量即時試算
                const updateBlockCalc = () => {
                    const n = parseInt(document.getElementById('blockSelect').value) || 2;
                    const mins = n * BLOCK_MINUTES;
                    document.getElementById('blockTimeCalc').textContent = `= ${mins} 分鐘（${formatDuration(mins)}）`;
                };
                document.getElementById('blockSelect').addEventListener('input', updateBlockCalc);

                // 遞迴選項
                document.getElementById('taskRecurring').addEventListener('change', (e) => {
                    document.getElementById('recurringOptions').style.display = e.target.checked ? 'block' : 'none';
                });

                // 迴圈雙向推算：截止日期 ↔ 重複次數
                let _recurringCalcLock = false;
                const getRecurringBase = () => ({
                    startDate: document.getElementById('taskDate').value,
                    interval: parseInt(document.getElementById('recurringDays').value) || 1
                });
                const daysDiff = (a, b) => {
                    if (!a || !b) return null;
                    const da = new Date(a + 'T00:00:00'), db = new Date(b + 'T00:00:00');
                    return Math.round((db - da) / 86400000);
                };
                const syncUntilDateFromCount = () => {
                    if (_recurringCalcLock) return;
                    const { startDate, interval } = getRecurringBase();
                    const count = parseInt(document.getElementById('recurringCount').value);
                    if (!startDate || !count || count < 1) return;
                    _recurringCalcLock = true;
                    document.getElementById('recurringUntilDate').value = addDaysToDate(startDate, interval * (count - 1));
                    _recurringCalcLock = false;
                };
                const syncCountFromUntilDate = () => {
                    if (_recurringCalcLock) return;
                    const { startDate, interval } = getRecurringBase();
                    const untilDate = document.getElementById('recurringUntilDate').value;
                    if (!startDate || !untilDate) return;
                    const diff = daysDiff(startDate, untilDate);
                    if (diff === null || diff < 0) return;
                    _recurringCalcLock = true;
                    document.getElementById('recurringCount').value = Math.floor(diff / interval) + 1;
                    _recurringCalcLock = false;
                };
                const resyncRecurringFields = () => {
                    if (document.getElementById('recurringCount').value) syncUntilDateFromCount();
                    else if (document.getElementById('recurringUntilDate').value) syncCountFromUntilDate();
                };
                document.getElementById('recurringCount').addEventListener('input', syncUntilDateFromCount);
                document.getElementById('recurringUntilDate').addEventListener('change', syncCountFromUntilDate);
                document.getElementById('recurringDays').addEventListener('input', resyncRecurringFields);
                document.getElementById('taskDate').addEventListener('change', resyncRecurringFields);

                // 任務群組選項
                document.getElementById('taskGroup').addEventListener('change', (e) => {
                    const groupOptions = document.getElementById('groupOptions');
                    groupOptions.style.display = e.target.checked ? 'block' : 'none';
                    if (e.target.checked) {
                        const currentGroupId = this.currentEditingTask?.groupId || null;
                        this.updateGroupSelect(currentGroupId);
                    }
                });

                // 日期模式選項
                document.querySelectorAll('input[name="dateMode"]').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        const dateInputGroup = document.getElementById('dateInputGroup');
                        const dateMode = e.target.value;

                        if (dateMode === 'scheduled') {
                            dateInputGroup.style.display = 'block';
                            const taskDateInput = document.getElementById('taskDate');
                            if (!taskDateInput.value) {
                                taskDateInput.value = localDateStr();
                            }
                        } else {
                            dateInputGroup.style.display = 'none';
                            document.getElementById('taskDate').value = '';
                        }
                    });
                });

                // 快速日期選擇按鈕
                this.setupQuickDateButtons();

                // 過濾器
                document.querySelectorAll('.filter-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const targetId = e.currentTarget.id;

                        if (targetId === 'toggleCompletedBtn') {
                            this.showCompleted = !this.showCompleted;
                            this.saveToStorage();
                            this.updateShowCompletedButton();
                            this.renderTasks();
                            return;
                        }

                        if (targetId === 'toggleSortBtn') {
                            if (this.sortMode === 'drag') {
                                this.saveTaskOrder(); // 切換前先儲存當前畫面順序
                            }
                            this.sortMode = this.sortMode === 'drag' ? 'fixed' : 'drag';
                            this.saveToStorage();
                            // 切換到固定排序且在群組視圖時，根據目前排列重算日期
                            if (this.sortMode === 'fixed' && this.currentFilter.startsWith('group:')) {
                                const gid = this.currentFilter.split(':')[1];
                                this.updateGroupTaskDates(gid);
                            }
                            this.updateUI();
                            return;
                        }

                        if (targetId === 'statsBtn') {
                            this.openStatsModal();
                            return;
                        }

                        if (targetId === 'compressBtn') {
                            const count = this.tasks.filter(t => t.completed && !t.compressed).length;
                            if (count === 0) {
                                this.showNotification('沒有可壓縮的已完成任務');
                            } else if (confirm(`壓縮 ${count} 個已完成任務？\n將清除詳細資料，只保留名稱、分類、時間收支與精準度。`)) {
                                this.compressCompletedTasks();
                            }
                            return;
                        }

                        const filter = btn.dataset.filter;
                        document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentFilter = filter;
                        this.renderTasks();

                        // 手機版：選擇視圖/分類後自動收合側欄，避免遮住任務列表
                        if (window.innerWidth <= 768) {
                            this.closeSidebarOverlay();
                        }
                    });
                });

                // 新增標籤
                document.getElementById('addTagBtn').addEventListener('click', () => {
                    this.openModal('tagModal');
                });

                document.getElementById('tagForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const tagName = document.getElementById('tagName').value.trim();
                    if (tagName) {
                        this.addTag(tagName);
                        this.renderTags();
                        document.getElementById('tagForm').reset();
                        closeModal('tagModal');
                        this.showNotification(`✅ 添加標籤：${tagName}`);
                    }
                });

                // 統一 drop 監聽器（只綁定一次）
                document.addEventListener('drop', (e) => {
                    const canDrop = this.sortMode === 'drag' || this.currentFilter.startsWith('group:');
                    const isSectionView = this.currentFilter === 'all';

                    if (isSectionView) {
                        // 三區塊：依落點 section 更新任務日期
                        const draggingEl = document.querySelector('.task-item.dragging');
                        if (draggingEl) {
                            const taskId = draggingEl.dataset.taskId;
                            const section = draggingEl.closest('.time-section');
                            if (section) {
                                const sectionType = section.dataset.section;
                                const todayStr = localDateStr();
                                const tomorrowStr = addDaysToDate(todayStr, 1);
                                const task = this.getTaskById(taskId);

                                if (sectionType === 'today' && task && task.date !== todayStr) {
                                    this.updateTask(taskId, { date: todayStr });
                                    this.showNotification('📅 已移至今天');
                                } else if (sectionType === 'tomorrow' && task && task.date !== tomorrowStr) {
                                    this.updateTask(taskId, { date: tomorrowStr });
                                    this.showNotification('🌅 已移至明天');
                                } else if (sectionType === 'later') {
                                    // 若任務原本是今天或明天，開啟 edit modal 選擇具體日期
                                    if (task && (task.date === todayStr || task.date === tomorrowStr || !task.date)) {
                                        setTimeout(() => this.openEditModal(taskId), 50);
                                    }
                                }
                            }
                        }
                        this.saveTaskOrder();
                    } else if (canDrop) {
                        this.saveTaskOrder();
                    }
                });

                // 備份事件監聽已在 setupBackupListeners() 中設定



                // 菜單 / 側欄收合切換
                const menuToggleBtn = document.getElementById('menuToggleBtn');
                const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
                const sidebar = document.querySelector('.sidebar');

                if (window.innerWidth <= 768) {
                    // 手機：overlay 模式（預設隱藏按鈕，JS 顯示）
                    menuToggleBtn.style.display = 'block';
                    menuToggleBtn.addEventListener('click', () => {
                        sidebar.classList.toggle('active');
                        menuToggleBtn.textContent = sidebar.classList.contains('active') ? '✕ 關閉' : '☰ 菜單';
                    });
                } else {
                    // 桌面：收合模式，從 localStorage 恢復狀態
                    if (localStorage.getItem('todoSidebarCollapsed') === '1') {
                        sidebar.classList.add('collapsed');
                    }
                    menuToggleBtn.textContent = sidebar.classList.contains('collapsed') ? '☰ 展開' : '☰ 收合';
                    menuToggleBtn.addEventListener('click', () => {
                        sidebar.classList.toggle('collapsed');
                        const isCollapsed = sidebar.classList.contains('collapsed');
                        localStorage.setItem('todoSidebarCollapsed', isCollapsed ? '1' : '0');
                        menuToggleBtn.textContent = isCollapsed ? '☰ 展開' : '☰ 收合';
                    });
                }

                if (sidebarCloseBtn) {
                    sidebarCloseBtn.addEventListener('click', () => this.closeSidebarOverlay());
                }
            }

            // 收合側欄（手機：關閉 overlay；桌面：收合並記住狀態），供側欄內按鈕與選擇視圖/分類後共用
            closeSidebarOverlay() {
                const sidebar = document.querySelector('.sidebar');
                const menuToggleBtn = document.getElementById('menuToggleBtn');
                if (!sidebar) return;

                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('active');
                    if (menuToggleBtn) menuToggleBtn.textContent = '☰ 菜單';
                } else {
                    sidebar.classList.add('collapsed');
                    localStorage.setItem('todoSidebarCollapsed', '1');
                    if (menuToggleBtn) menuToggleBtn.textContent = '☰ 展開';
                }
            }

            openModal(modalId, title = '') {
                const modal = document.getElementById(modalId);
                modal.classList.add('active');
                if (title) {
                    document.getElementById('modalTitle').textContent = title;
                }
            }

            openEditModal(taskId) {
                this.currentEditingTask = this.getTaskById(taskId);
                if (!this.currentEditingTask) return;

                this.openModal('taskModal', '編輯任務');

                const task = this.currentEditingTask;
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDescription').value = task.description || '';

                // 設置日期模式
                let dateMode = 'scheduled';
                if (!task.date) {
                    dateMode = 'unscheduled';
                } else if (task.date === '9999-12-31') {
                    dateMode = 'unlimited';
                }
                document.querySelector(`input[name="dateMode"][value="${dateMode}"]`).checked = true;
                document.getElementById('taskDate').value = task.date || '';
                document.getElementById('dateInputGroup').style.display = dateMode === 'scheduled' ? 'block' : 'none';

                // 設置釘選狀態
                document.querySelector(`input[name="pinned"][value="${task.pinned || ''}"]`).checked = true;

                // 設置預計時間和 blocks
                document.querySelector(`input[name="estimatedTime"][value="${task.estimatedTime}"]`).checked = true;

                // 設置任務類型
                const taskTypeVal = task.taskType || 'goal';
                document.querySelector(`input[name="taskType"][value="${taskTypeVal}"]`).checked = true;
                const blockSelectGroup = document.getElementById('blockSelectGroup');
                if (task.estimatedTime === '30plus') {
                    blockSelectGroup.style.display = 'block';
                    if (task.blocks) {
                        document.getElementById('blockSelect').value = task.blocks;
                        document.getElementById('blockSelect').dispatchEvent(new Event('input'));
                    }
                } else {
                    blockSelectGroup.style.display = 'none';
                }

                document.querySelector(`input[name="category"][value="${task.category}"]`).checked = true;

                document.getElementById('taskRecurring').checked = task.recurring && task.recurring.enabled;
                document.getElementById('recurringOptions').style.display = task.recurring && task.recurring.enabled ? 'block' : 'none';
                if (task.recurring) {
                    document.getElementById('recurringDays').value = task.recurring.interval || 1;
                    document.getElementById('recurringUntilDate').value = task.recurring.untilDate || '';
                    document.getElementById('recurringCount').value = task.recurring.repeatCount || '';
                }

                document.getElementById('taskGroup').checked = !!task.groupId;
                document.getElementById('groupOptions').style.display = task.groupId ? 'block' : 'none';

                // 更新群組選擇
                this.updateGroupSelect(task.groupId);

                document.getElementById('actualTimeGroup').style.display = 'block';
                document.getElementById('actualTime').value = task.actualTime || '';

                // 顯示下一步建議欄位（如果有實際時間或已完成）
                if (task.actualTime || task.completed) {
                    document.getElementById('nextStepNotesGroup').style.display = 'block';
                    document.getElementById('editNextStepNotes').value = task.nextStepNotes || '';
                } else {
                    document.getElementById('nextStepNotesGroup').style.display = 'none';
                }

                this.renderTags();

                // 複製按鈕
                document.getElementById('duplicateTaskBtn').style.display = 'block';
                document.getElementById('duplicateTaskBtn').onclick = () => {
                    this.duplicateTask(taskId);
                    closeModal('taskModal');
                    this.showNotification('✅ 任務已複製');
                };

                // 刪除按鈕
                document.getElementById('deleteTaskBtn').style.display = 'block';
                document.getElementById('deleteTaskBtn').onclick = () => {
                    if (confirm('確定要刪除此任務嗎？')) {
                        this.deleteTask(taskId);
                        this.updateUI();
                        closeModal('taskModal');
                        this.showNotification('✅ 任務已刪除');
                    }
                };
            }

            updateGroupSelect(currentGroupId) {
                const groupSelect = document.getElementById('groupSelect');
                const newGroupNameGroup = document.getElementById('newGroupNameGroup');
                const groupOrderDisplay = document.getElementById('groupOrderDisplay');

                // 收集所有現有群組
                const groups = new Set();
                this.tasks.forEach(task => {
                    if (task.groupId) {
                        groups.add(task.groupId);
                    }
                });

                // 更新選項
                groupSelect.innerHTML = '<option value="">-- 建立新群組 --</option>';
                groups.forEach(group => {
                    const option = document.createElement('option');
                    option.value = group;
                    option.textContent = group;
                    if (group === currentGroupId) {
                        option.selected = true;
                    }
                    groupSelect.appendChild(option);
                });

                const setCycleModeRadio = (mode) => {
                    const radio = document.querySelector(`input[name="groupCycleMode"][value="${mode}"]`);
                    if (radio) radio.checked = true;
                };

                const setDelayModeRadio = (mode) => {
                    const radio = document.querySelector(`input[name="groupDelayMode"][value="${mode}"]`);
                    if (radio) radio.checked = true;
                };

                // 監聽選擇變化
                groupSelect.onchange = () => {
                    const isNewGroup = groupSelect.value === '';
                    newGroupNameGroup.style.display = isNewGroup ? 'block' : 'none';

                    if (groupSelect.value) {
                        // 顯示該群組內的任務數
                        const groupTasks = this.tasks.filter(t => t.groupId === groupSelect.value)
                            .sort((a, b) => (a.groupOrder || 1) - (b.groupOrder || 1));
                        const nextOrder = groupTasks.length + 1;
                        groupOrderDisplay.textContent = `此群組已有 ${groupTasks.length} 個任務，新任務順序：${nextOrder}`;
                        setCycleModeRadio(groupTasks[0]?.groupCycleMode || 'uniform');
                        setDelayModeRadio(groupTasks[0]?.groupDelayMode || 'fixed');
                    } else {
                        groupOrderDisplay.textContent = '';
                        setCycleModeRadio('uniform');
                        setDelayModeRadio('fixed');
                    }
                };

                // 初始化顯示
                if (currentGroupId) {
                    const groupTasks = this.tasks.filter(t => t.groupId === currentGroupId);
                    const currentTaskOrder = groupTasks.find(t => t.id === this.currentEditingTask.id)?.groupOrder || 1;
                    groupOrderDisplay.textContent = `此群組有 ${groupTasks.length} 個任務，當前順序：${currentTaskOrder}`;
                    setCycleModeRadio(groupTasks[0]?.groupCycleMode || 'uniform');
                    setDelayModeRadio(groupTasks[0]?.groupDelayMode || 'fixed');
                } else {
                    newGroupNameGroup.style.display = 'block';
                    groupOrderDisplay.textContent = '';
                    setCycleModeRadio('uniform');
                    setDelayModeRadio('fixed');
                }
            }


            openCompleteTimeModal(taskId, checkbox) {
                const task = this.getTaskById(taskId);
                if (!task) return;

                // 設置預計時間提示
                const estimateTimeHint = document.getElementById('estimateTimeHint');
                const estimateTime = getTaskPlannedMinutes(task);

                estimateTimeHint.textContent = `預計時間：${estimateTime} 分鐘`;

                // 初始化輸入框
                document.getElementById('completeTimeInput').value = '';
                document.getElementById('nextStepNotes').value = task.nextStepNotes || '';
                document.getElementById('completeTimeInput').focus();


                // 設置按鈕事件
                document.getElementById('useEstimateBtn').onclick = () => {
                    this.completeTaskWithTime(taskId, estimateTime);
                    closeModal('completeTimeModal');
                };

                document.getElementById('confirmCompleteBtn').onclick = () => {
                    const actualTime = document.getElementById('completeTimeInput').value.trim();
                    if (!actualTime) {
                        // 未填寫時使用預計時間
                        this.completeTaskWithTime(taskId, estimateTime);
                    } else {
                        const time = parseInt(actualTime);
                        if (isNaN(time) || time < 0) {
                            alert('請輸入有效的時間（正整數）');
                            return;
                        }
                        this.completeTaskWithTime(taskId, time);
                    }
                    closeModal('completeTimeModal');
                };

                // 回車鍵確認
                bindEnterToClick('completeTimeInput', 'confirmCompleteBtn');

                // 保存原始複選框狀態，以便用戶點擊外部取消時恢復（實際關閉交由通用 backdrop-click handler 處理）
                const originalModal = document.getElementById('completeTimeModal');
                originalModal.onclick = (e) => {
                    if (e.target === originalModal && checkbox) {
                        checkbox.checked = false;
                    }
                };

                this.openModal('completeTimeModal');
            }

            completeTaskWithTime(taskId, actualTime) {
                const nextStepNotes = document.getElementById('nextStepNotes')?.value?.trim() || '';
                const task = this.getTaskById(taskId);
                const timeBalance = this.calcTimeBalance(task, actualTime);

                const updates = {
                    completed: true,
                    actualTime,
                    timeBalance
                };

                if (nextStepNotes) {
                    updates.nextStepNotes = nextStepNotes;
                }

                this.updateTask(taskId, updates);

                // 迴圈任務：自動建立下一次
                if (task && task.recurring && task.recurring.enabled) {
                    this.createNextRecurringTask(task);
                }

                this.updateUI();
                this.showNotification(`✅ 任務已完成！用時 ${actualTime} 分鐘`);
            }

            openBlockTimeModal(taskId, blockIndex, newCompleted) {
                const task = this.getTaskById(taskId);
                if (!task) return;
                const totalBlocks = task.blocks;
                const BLOCK_ESTIMATE = BLOCK_MINUTES;

                document.getElementById('blockTimeModalTitle').textContent = `Block ${newCompleted}/${totalBlocks} 完成！`;
                document.getElementById('blockTimeModalHint').textContent = `本段預計：${BLOCK_ESTIMATE} 分鐘`;
                document.getElementById('blockTimeInput').value = '';

                const confirmBlock = (minutes) => {
                    const blockTimes = [...(task.blockTimes || [])];
                    blockTimes[blockIndex] = minutes;
                    const runningActual = (task.actualTime || 0) + minutes;
                    const updates = { completedBlocks: newCompleted, blockTimes, actualTime: runningActual };

                    if (newCompleted === totalBlocks) {
                        const totalPlanned = totalBlocks * BLOCK_ESTIMATE;
                        updates.completed = true;
                        updates.timeBalance = this.calcTimeBalance(task, runningActual);
                        // 處理 nextStepNotes（若 completeTimeModal 的欄位存在）
                        const nsEl = document.getElementById('nextStepNotes');
                        if (nsEl && nsEl.value.trim()) updates.nextStepNotes = nsEl.value.trim();
                        this.updateTask(taskId, updates);
                        if (task.recurring && task.recurring.enabled) this.createNextRecurringTask(task);
                        closeModal('blockTimeModal');
                        const diffSymbol = ' ' + getTimingSymbol(runningActual - totalPlanned);
                        this.showNotification(`✅ 全部 ${totalBlocks} blocks 完成！總用時 ${runningActual}分 vs 預計 ${totalPlanned}分${diffSymbol}`);
                    } else {
                        this.updateTask(taskId, updates);
                        closeModal('blockTimeModal');
                        const diff = minutes - BLOCK_ESTIMATE;
                        const diffSymbol = diff < -10 ? ` ⏩ 節省 ${Math.abs(diff)}分` : diff > 10 ? ` ⚠️ 超時 ${diff}分` : ` ${getTimingSymbol(diff)}`;
                        this.showNotification(`Block ${newCompleted}/${totalBlocks} 完成，用時 ${minutes}分${diffSymbol}`);
                    }
                    this.updateUI();
                };

                document.getElementById('blockTimeUseEstimateBtn').onclick = () => confirmBlock(BLOCK_ESTIMATE);
                document.getElementById('blockTimeConfirmBtn').onclick = () => {
                    const val = parseInt(document.getElementById('blockTimeInput').value);
                    confirmBlock(isNaN(val) || val < 0 ? BLOCK_ESTIMATE : val);
                };
                bindEnterToClick('blockTimeInput', 'blockTimeConfirmBtn');

                this.openModal('blockTimeModal');
            }

            createNextRecurringTask(completedTask) {
                const interval = completedTask.recurring.interval;
                let nextDate = '';

                if (completedTask.groupId) {
                    // 群組任務：下一次日期 = 群組最後一個未完成任務的日期 + interval
                    const activeTasks = this.tasks
                        .filter(t => t.groupId === completedTask.groupId && !t.completed && t.id !== completedTask.id)
                        .sort((a, b) => (a.groupOrder ?? 999) - (b.groupOrder ?? 999));

                    const lastTask = activeTasks[activeTasks.length - 1];
                    const cascadeInterval = lastTask?.recurring?.interval ?? interval;
                    if (lastTask && lastTask.date && lastTask.date !== '9999-12-31') {
                        nextDate = addDaysToDate(lastTask.date, cascadeInterval);
                    } else if (completedTask.date && completedTask.date !== '9999-12-31') {
                        nextDate = addDaysToDate(completedTask.date, interval);
                    }
                } else {
                    // 獨立迴圈任務：下一次日期 = 原日期 + interval
                    if (completedTask.date && completedTask.date !== '9999-12-31') {
                        nextDate = addDaysToDate(completedTask.date, interval);
                    } else {
                        nextDate = addDaysToDate(localDateStr(), interval);
                    }
                }

                // 迴圈結束日期檢查
                if (completedTask.recurring.untilDate && nextDate && nextDate > completedTask.recurring.untilDate) {
                    this.showNotification('🔁 已到達迴圈結束日期，不再建立新任務');
                    return;
                }

                // 計算新的 groupOrder（放在群組末尾）
                let newGroupOrder = null;
                if (completedTask.groupId) {
                    const allGroupTasks = this.tasks.filter(t => t.groupId === completedTask.groupId);
                    newGroupOrder = allGroupTasks.length > 0
                        ? Math.max(...allGroupTasks.map(t => t.groupOrder ?? 0)) + 1
                        : 1;
                }

                const newTask = {
                    title: completedTask.title,
                    description: completedTask.description,
                    date: nextDate,
                    estimatedTime: completedTask.estimatedTime,
                    blocks: completedTask.blocks,
                    completedBlocks: 0,
                    blockTimes: [],
                    category: completedTask.category,
                    taskType: completedTask.taskType || 'goal',
                    tags: completedTask.tags ? [...completedTask.tags] : [],
                    recurring: { ...completedTask.recurring, completedCount: (completedTask.recurring.completedCount || 0) + 1 },
                    groupId: completedTask.groupId || null,
                    groupName: completedTask.groupName || null,
                    groupCycleMode: completedTask.groupCycleMode || 'uniform',
                    groupDelayMode: completedTask.groupDelayMode || 'fixed',
                    groupOrder: newGroupOrder,
                    actualTime: null,
                    nextStepNotes: null,
                    pinned: completedTask.pinned || null
                };

                this.addTask(newTask);
                this.updateTask(completedTask.id, { recurringCreated: true });
                this.showNotification(`🔁 已自動建立下一次：${nextDate}`);
            }

            completeNonContinuousTask(taskId) {
                const task = this.getTaskById(taskId);
                if (!task) return;
                this.updateTask(taskId, { completed: true, actualTime: null });
                if (task.recurring && task.recurring.enabled) {
                    this.createNextRecurringTask(task);
                }
                this.updateUI();
                this.showNotification('✅ 任務已完成（非連續）');
            }

            cancelCompleteTime() {
                closeModal('completeTimeModal');
                // 重新渲染以恢復複選框狀態
                this.updateUI();
            }

            calcTimeBalance(task, actualTime) {
                if (task.estimatedTime === 'non-continuous') return null;
                const planned = getTaskPlannedMinutes(task);
                const type = task.taskType || 'goal';
                if (type === 'accumulative') return actualTime - planned;
                if (type === 'goal')         return planned - actualTime;
                if (type === 'ahead')        return actualTime;
                return null;
            }

            compressCompletedTasks() {
                let count = 0;
                this.tasks = this.tasks.map(task => {
                    if (!task.completed || task.compressed) return task;
                    count++;

                    // 預計時間（分鐘）
                    const plannedTime = getTaskPlannedMinutes(task);

                    // 時間收支（優先用任務完成時已計算的值）
                    let timeBalance = null;
                    if (task.timeBalance !== undefined && task.timeBalance !== null) {
                        timeBalance = task.timeBalance;
                    } else {
                        timeBalance = this.calcTimeBalance(task, task.actualTime ?? plannedTime);
                    }

                    return {
                        id:            task.id,
                        title:         task.title,
                        category:      task.category,
                        taskType:      task.taskType      || null,
                        estimatedTime: task.estimatedTime || null,
                        date:          task.date          || null,
                        plannedTime,
                        actualTime:    task.actualTime    || null,
                        completed:     true,
                        compressed:    true,
                        completedDate: task.completedDate || task.completedAt?.split('T')[0] || '',
                        timeBalance,
                    };
                });

                // 清除預定日期/完成日期超過30天前的舊壓縮資料，避免資料無限累積
                const cutoff = new Date();
                cutoff.setDate(cutoff.getDate() - 30);
                const cutoffStr = localDateStr(cutoff);
                const beforeLen = this.tasks.length;
                this.tasks = this.tasks.filter(t => {
                    if (!t.compressed) return true;
                    const ref = t.completedDate || t.date;
                    return !ref || ref >= cutoffStr;
                });
                const removed = beforeLen - this.tasks.length;

                this.saveToStorage();
                this.updateUI();
                this.showNotification(`📦 已壓縮 ${count} 個已完成任務${removed > 0 ? `，並清除 ${removed} 筆逾30天舊資料` : ''}`);
            }
