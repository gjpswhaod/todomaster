<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TodoMaster">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js').catch(() => {});
        });
      }
    </script>
    <title>TodoMaster v5.3.2 - 任務管理工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3a3a3a;
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0b0;
            --accent-primary: #4a9eff;
            --accent-secondary: #ff6b6b;
            --accent-success: #51cf66;
            --category-career: #4a9eff;
            --category-recharge: #a78bfa;
            --category-life: #34d399;
            --category-review: #fbbf24;
        }

        html {
            height: 100%;
            font-size: 16px;
            color-scheme: dark;
        }

        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;   /* fallback */
            height: 100svh;  /* iOS：不含地址欄的安全視口高度 */
            gap: 0;
        }

        /* 側邊欄 */
        .sidebar {
            flex-shrink: 0;
            width: 260px;
            min-width: 0;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--bg-tertiary);
            padding: 20px;
            overflow-y: auto;
            transition: width 0.25s ease, padding 0.25s ease;
        }

        .sidebar.collapsed {
            width: 0;
            padding: 0;
            overflow: hidden;
            border-right: none;
        }

        .sidebar-header {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .sidebar-section {
            margin-bottom: 28px;
        }

        .sidebar-section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .filter-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 0.95rem;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .filter-item:hover {
            background-color: var(--bg-tertiary);
        }

        .filter-item.active {
            background-color: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
        }

        .filter-icon {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .tag-item {
            padding: 4px 10px;
            background-color: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--bg-tertiary);
        }

        .tag-item:hover {
            border-color: var(--text-secondary);
        }

        .tag-item.active {
            background-color: var(--accent-primary);
            color: var(--bg-primary);
            border-color: var(--accent-primary);
        }

        /* 主內容區 */
        .main-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        /* 頂部控制欄 */
        .top-bar {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--bg-tertiary);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .top-bar-left {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .top-bar-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .date-display {
            font-size: 0.95rem;
            color: var(--text-secondary);
            padding: 8px 12px;
            background-color: var(--bg-tertiary);
            border-radius: 6px;
        }

        /* 按鈕 */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn-primary {
            background-color: var(--accent-primary);
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            background-color: #3a8ce5;
            transform: translateY(-1px);
        }

        .btn.active {
            background-color: var(--accent-primary);
            color: var(--bg-primary);
        }

        .btn-secondary {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--bg-tertiary);
        }

        .btn-secondary:hover {
            border-color: var(--text-secondary);
            background-color: var(--bg-primary);
        }

        .btn-danger {
            background-color: var(--accent-secondary);
            color: white;
        }

        .btn-danger:hover {
            background-color: #ff5252;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        /* 任務區域 */
        .task-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            background-color: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 8px;
            padding: 16px;
            transition: all 0.2s;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: start;
            cursor: default;
        }

        .task-item:hover {
            border-color: var(--accent-primary);
            background-color: var(--bg-tertiary);
        }


        /* 時間顏色編碼 */
        .task-item.time-10min {
            border-left: 4px solid #808080;
        }

        .task-item.time-30min {
            border-left: 4px solid #4a9eff;
        }

        .task-item.time-30plus {
            border-left: 4px solid #ff9d3d;
        }

        .task-item.time-non-continuous {
            border-left: 4px solid #a78bfa;
        }

        /* 進度條 */
        .task-progress {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            align-items: center;
        }

        .task-blocks {
            display: flex;
            gap: 4px;
            flex: 1;
        }

        .task-block {
            flex: 1;
            height: 6px;
            background-color: var(--bg-tertiary);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-block:hover {
            background-color: var(--text-secondary);
        }

        .task-block.completed {
            background-color: var(--accent-success);
        }

        .task-progress-text {
            font-size: 0.75rem;
            color: var(--text-secondary);
            min-width: 30px;
            text-align: right;
        }

        .reschedule-today-btn {
            display: inline-block;
            margin-top: 6px;
            padding: 3px 10px;
            font-size: 0.78rem;
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid #ff6b6b;
            border-radius: 4px;
            color: #ff6b6b;
            cursor: pointer;
        }
        .reschedule-today-btn:hover { background: rgba(255, 107, 107, 0.3); }

        .time-section { margin-bottom: 4px; }
        .time-section-header {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 8px 4px 6px;
            border-bottom: 1px solid var(--bg-tertiary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .section-time-total {
            font-size: 0.72rem;
            font-weight: 400;
            text-transform: none;
            letter-spacing: normal;
            color: var(--text-secondary);
            opacity: 0.75;
        }
        .section-task-list { list-style: none; padding: 0; margin: 0; min-height: 36px; }
        .reschedule-all-btn {
            font-size: 0.7rem;
            padding: 2px 8px;
            background: rgba(255, 107, 107, 0.12);
            border: 1px solid rgba(255, 107, 107, 0.35);
            border-radius: 4px;
            color: #ff6b6b;
            cursor: pointer;
            margin-left: auto;
            font-weight: 500;
            letter-spacing: 0;
            text-transform: none;
        }
        .reschedule-all-btn:hover { background: rgba(255, 107, 107, 0.28); }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--accent-primary);
        }

        .task-title {
            font-weight: 500;
            font-size: 1rem;
            color: var(--text-primary);
            word-break: break-word;
        }

        .task-pin-icon {
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .task-badges {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-left: auto;
        }

        .task-category {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            width: fit-content;
        }

        .task-category.career {
            background-color: rgba(74, 158, 255, 0.2);
            color: var(--category-career);
        }

        .task-category.recharge {
            background-color: rgba(167, 139, 250, 0.2);
            color: var(--category-recharge);
        }

        .task-category.life {
            background-color: rgba(52, 211, 153, 0.2);
            color: var(--category-life);
        }

        .task-category.review {
            background-color: rgba(251, 191, 36, 0.2);
            color: var(--category-review);
        }

        .task-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .task-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .task-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 8px 10px;
            background-color: var(--bg-tertiary);
            border-radius: 6px;
        }

        .task-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .task-tag {
            background-color: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* 模態框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 12px;
            padding: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }

        .recurring-end-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .recurring-end-col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .recurring-end-col label {
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-size: 0.9em;
        }

        .recurring-divider {
            color: var(--text-secondary);
            font-size: 1.1em;
            padding-bottom: 8px;
            flex-shrink: 0;
        }

        .form-group label {
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group input[type="number"],
        .form-group textarea,
        .form-group select {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input[type="text"]:focus,
        .form-group input[type="date"]:focus,
        .form-group input[type="number"]:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
            background-color: var(--bg-primary);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .radio-item,
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .radio-item:hover,
        .checkbox-item:hover {
            background-color: var(--bg-tertiary);
        }

        .radio-item input,
        .checkbox-item input {
            cursor: pointer;
            accent-color: var(--accent-primary);
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            border-top: 1px solid var(--bg-tertiary);
            padding-top: 20px;
        }

        /* 空狀態 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            gap: 16px;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 3rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.1rem;
        }

        /* 統計資訊 */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* 滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .app-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
                position: fixed;
                left: 0;
                top: 0;
                width: 260px;
                height: 100vh;
                z-index: 999;
                box-shadow: 2px 0 8px rgba(0, 0, 0, 0.5);
            }

            .sidebar.active {
                display: block;
            }

            .top-bar {
                padding: 12px 16px;
            }

            .task-item {
                grid-template-columns: 1fr;
            }

            .task-badges {
                margin-left: 0;
            }

            .modal-content {
                max-width: 90%;
            }
        }

        /* 過渡動畫 */
        .fade-in {
            animation: fadeIn 0.2s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--accent-success);
            color: white;
            padding: 16px 20px;
            border-radius: 6px;
            z-index: 2000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    
        /* 群組拖曳排序樣式 */
        .task-item.dragging {
            opacity: 0.3;
        }

        .task-item.sortable {
            cursor: grab;
        }

        .task-item.sortable:active {
            cursor: grabbing;
        }
</style>

    <script>
        const APP_VERSION = 'v5.3.2';
        const BLOCK_MINUTES = 30;
        const CATEGORY_META = {
            career: { emoji: '💼', label: '事業' },
            recharge: { emoji: '⚡', label: '充電' },
            life: { emoji: '🏠', label: '生活' },
            review: { emoji: '🔍', label: '復盤' }
        };
        const TIME_META = {
            '10min': { emoji: '⏱️', label: '10分鐘' },
            '30min': { emoji: '⏲️', label: '30分鐘' },
            '30plus': { emoji: '⏳', label: '30+分鐘' },
            'non-continuous': { emoji: '🔀', label: '非連續' }
        };

        function localDateStr(date = new Date()) {
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        }
        function localDateTimeStr(date = new Date()) {
            return `${localDateStr(date)}-${String(date.getHours()).padStart(2,'0')}${String(date.getMinutes()).padStart(2,'0')}${String(date.getSeconds()).padStart(2,'0')}`;
        }
        function addDaysToDate(dateStr, n) {
            const [y, m, d] = dateStr.split('-').map(Number);
            const dt = new Date(y, m - 1, d);
            dt.setDate(dt.getDate() + n);
            return localDateStr(dt);
        }
        function getTodayMidnight() {
            const d = new Date();
            d.setHours(0, 0, 0, 0);
            return d;
        }
        function getTaskPlannedMinutes(task) {
            if (task.estimatedTime === 'non-continuous') return 0;
            if (task.estimatedTime === '30plus') return task.blocks ? task.blocks * BLOCK_MINUTES : 45;
            const estimatedMap = { '10min': 10, '30min': 30 };
            return estimatedMap[task.estimatedTime] ?? 0;
        }
        function formatDuration(minutes) {
            const hrs = minutes / 60;
            const hrsText = Number.isInteger(hrs) ? `${hrs}` : hrs.toFixed(1);
            return `${hrsText} 小時`;
        }
        function dateAtMidnight(dateStr) {
            if (!dateStr || dateStr === '9999-12-31') return null;
            const d = new Date(dateStr);
            d.setHours(0, 0, 0, 0);
            return d;
        }
        function isTaskOverdue(task, todayMidnight) {
            const due = dateAtMidnight(task.date);
            return !task.completed && due && due < todayMidnight;
        }
        function getTimingSymbol(diffMinutes) {
            if (diffMinutes < -10) return '⏩';
            if (diffMinutes > 10) return '⚠️';
            return '✅';
        }
        function bindEnterToClick(inputId, btnId) {
            document.getElementById(inputId).onkeypress = (e) => {
                if (e.key === 'Enter') document.getElementById(btnId).click();
            };
        }

</script>

    </head>
<body>
    <div class="app-container">
        <!-- 側邊欄 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                📋 TodoMaster
                <button class="btn btn-secondary btn-small" id="sidebarCloseBtn" title="收合側欄">✕</button>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">視圖</div>
                <button class="filter-item active" data-filter="all">
                    <span class="filter-icon">📊</span>
                    所有任務
                </button>
                <button class="filter-item" id="toggleSortBtn">
                    <span class="filter-icon">🔄</span>
