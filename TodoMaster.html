            _buildBackupData() {
                return {
                    version: APP_VERSION,
                    syncDate: new Date().toISOString(),
                    tasks: this.tasks,
                    tags: this.tags
                };
            }

            // ===== 同步資料夾功能 =====

            async setSyncFolder() {
                if (!window.showDirectoryPicker) {
                    this.showNotification('❌ 此瀏覽器不支援資料夾存取，請使用 Chrome 或 Edge');
                    return;
                }
                try {
                    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    await saveDirHandle(handle);
                    this.updateSyncFolderUI(handle.name);
                    await this.autoImportFromSyncFolder(handle);
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        this.showNotification('❌ 設定同步資料夾失敗：' + e.message);
                    }
                }
            }

            /**
             * 取得有效且已授權的資料夾 handle（含自動修復）。
             *
             * 處理流程：
             * 1. 從 IndexedDB 載入已存 handle
             * 2. 若 handle 存在 → queryPermission
             *    a. 'granted'       → 直接返回（最佳情況）
             *    b. 'prompt'        → requestPermission（需使用者確認）
             *       - granted → 返回
             *       - denied  → 清除後走步驟 3
             *    c. 'denied'        → 清除後走步驟 3
             *    d. InvalidStateError（手機 session 失效）→ 清除後走步驟 3
             * 3. 無有效 handle → 自動呼叫 showDirectoryPicker 讓使用者重新選擇
             *    - 選擇成功 → 存入 IndexedDB，返回新 handle，繼續原操作
             *    - 使用者取消 → 返回 null（靜默）
             *
             * @returns {FileSystemDirectoryHandle|null}
             */
            async _resolveWritableDirHandle() {
                let handle = await loadDirHandle();

                if (handle) {
                    try {
                        const perm = await handle.queryPermission({ mode: 'readwrite' });
                        if (perm === 'granted') {
                            return handle; // ✅ 有效且已授權，直接使用
                        }
                        if (perm === 'prompt') {
                            // handle 有效但需重新授權（Android Chrome 常見於頁面重載後）
                            const req = await handle.requestPermission({ mode: 'readwrite' });
                            if (req === 'granted') return handle;
                            // 使用者拒絕 → 清除後重選
                            console.warn('[Sync] requestPermission 被拒絕，清除 handle');
                            await clearDirHandle();
                            this.updateSyncFolderUI(null);
                        } else {
                            // 'denied' → 清除後重選
                            console.warn('[Sync] permission denied，清除 handle');
                            await clearDirHandle();
                            this.updateSyncFolderUI(null);
                        }
                    } catch (e) {
                        if (e.name === 'InvalidStateError') {
                            // handle 的內部 native 參照已失效（手機背景/重啟後常見）
                            console.warn('[Sync] InvalidStateError，handle 失效，清除並重選:', e.message);
                            await clearDirHandle();
                            this.updateSyncFolderUI(null);
                        } else {
                            throw e; // 其他非預期錯誤往上拋
                        }
                    }
                }

                // 沒有有效 handle（初次、或失效被清除）→ 自動引導重選
                if (!window.showDirectoryPicker) {
                    this.showNotification('❌ 此瀏覽器不支援資料夾存取，請使用 Chrome 或 Edge');
                    return null;
                }

                try {
                    const newHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    await saveDirHandle(newHandle);
                    this.updateSyncFolderUI(newHandle.name);
                    console.log('[Sync] 重新選擇資料夾成功:', newHandle.name);
                    return newHandle;
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        console.error('[Sync] showDirectoryPicker 失敗:', e.name, e.message);
                        this.showNotification('❌ 無法開啟資料夾選擇器：' + e.message);
                    }
                    return null;
                }
            }

            async getLatestBackupFile(handle) {
                let latest = null;
                for await (const entry of handle.values()) {
                    if (entry.kind !== 'file') continue;
                    if (!entry.name.startsWith('todomaster-backup-') || !entry.name.endsWith('.json')) continue;
                    const file = await entry.getFile();
                    try {
                        const text = await file.text();
                        const data = JSON.parse(text);
                        if (!data.tasks || !Array.isArray(data.tasks)) continue;
                        if (!latest || new Date(data.syncDate) > new Date(latest.data.syncDate)) {
                            latest = { file, data };
                        }
                    } catch (e) { /* 跳過損毀檔案 */ }
                }
                return latest;
            }

            _applyBackupData(latest) {
                this.tasks = latest.data.tasks;
                this.tags = latest.data.tags || [];
                this.saveToStorage();
                this.updateUI();
            }

            async autoImportFromSyncFolder(handleOverride) {
                try {
                    // 啟動時靜默同步：使用傳入的 handle（初次設定）或從 IndexedDB 載入
                    // 注意：此處「不」呼叫 showDirectoryPicker，避免啟動時彈出選擇器
                    let handle = handleOverride || await loadDirHandle();
                    if (!handle) return;

                    let perm;
                    try {
                        perm = await handle.queryPermission({ mode: 'readwrite' });
                    } catch (e) {
                        if (e.name === 'InvalidStateError') {
                            // 手機 session 重啟後 handle 失效：靜默清除，不打擾使用者
                            // 使用者下次點「匯出/匯入同步」時會自動引導重新選擇
                            console.warn('[Sync] 啟動自動同步：handle 失效，已清除，等待使用者觸發同步');
                            await clearDirHandle();
                            this.updateSyncFolderUI(null);
                            return;
                        }
                        throw e;
                    }

                    if (perm !== 'granted') return; // 啟動時不強迫授權

                    this.updateSyncFolderUI(handle.name);

                    const latest = await this.getLatestBackupFile(handle);
                    if (!latest) return;

                    const localSyncDate = localStorage.getItem('todoSyncDate');
                    const backupDate = new Date(latest.data.syncDate);
                    const localDate = localSyncDate ? new Date(localSyncDate) : new Date(0);

                    if (backupDate > localDate) {
                        this._applyBackupData(latest);
                        const dateStr = backupDate.toLocaleDateString('zh-TW');
                        this.showNotification(`✅ 已同步最新資料（${dateStr}）`);
                    }
                } catch (e) {
                    console.warn('[Sync] 啟動自動同步失敗:', e);
                }
            }

            async manualImportFromSyncFolder() {
                try {
                    // _resolveWritableDirHandle 自動處理：失效偵測 → 清除 → 重選 → 繼續
                    const handle = await this._resolveWritableDirHandle();
                    if (!handle) return;

                    this.updateSyncFolderUI(handle.name);

                    const latest = await this.getLatestBackupFile(handle);
                    if (!latest) {
                        this.showNotification('❌ 同步資料夾中無備份檔案');
                        return;
                    }

                    const localSyncDate = localStorage.getItem('todoSyncDate');
                    const backupDate = new Date(latest.data.syncDate);
                    const localDate = localSyncDate ? new Date(localSyncDate) : new Date(0);

                    if (backupDate <= localDate) {
                        this.showNotification('✅ 本地已是最新同步版本');
                        return;
                    }

                    const dateStr = backupDate.toLocaleString('zh-TW');
                    this._applyBackupData(latest);
                    localStorage.setItem('todoSyncDate', latest.data.syncDate);
                    this.showNotification(`✅ 已匯入同步資料（${dateStr}）`);
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        console.error('[Sync] manualImportFromSyncFolder 未預期錯誤:', e);
                        this.showNotification('❌ 匯入同步失敗：' + e.message);
                    }
                }
            }

            async exportToSyncFolder() {
                const data = this._buildBackupData();
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const filename = `todomaster-backup-${localDateTimeStr()}.json`;

                try {
                    if (window.showSaveFilePicker) {
                        // 使用 OS 存檔對話框（預設開啟同步資料夾）：
                        // 不預先建立空白檔案，完全避免雲端同步服務的鎖定競爭
                        const dirHandle = await loadDirHandle();
                        const saveHandle = await window.showSaveFilePicker({
                            suggestedName: filename,
                            startIn: dirHandle || 'downloads',
                            types: [{ description: 'JSON 備份', accept: { 'application/json': ['.json'] } }]
                        });
                        const writable = await saveHandle.createWritable();
                        try {
                            await writable.write(blob);
                            await writable.close();
                        } catch (writeErr) {
                            try { await writable.abort(); } catch (_) {}
                            throw writeErr;
                        }
                    } else {
                        // 降級：不支援 showSaveFilePicker 時直接觸發瀏覽器下載
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = filename;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(url);
                    }
                    localStorage.setItem('todoSyncDate', data.syncDate);
                    this.showNotification('✅ 備份已匯出至同步資料夾');
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        console.error('[Sync] exportToSyncFolder 失敗:', e);
                        this.showNotification('❌ 匯出失敗：' + e.message);
                    }
                }
            }

            updateSyncFolderUI(folderName) {
                const el = document.getElementById('syncFolderName');
                if (el) el.textContent = folderName || '未設定';
            }

            setupBackupListeners() {
                const setSyncBtn = document.getElementById('setSyncFolderBtn');
                const exportSyncBtn = document.getElementById('exportSyncBtn');

                if (setSyncBtn) {
                    setSyncBtn.addEventListener('click', () => this.setSyncFolder());
                }
                if (exportSyncBtn) {
                    exportSyncBtn.addEventListener('click', () => this.exportToSyncFolder());
                }
                const importSyncBtn = document.getElementById('importSyncBtn');
                if (importSyncBtn) {
                    importSyncBtn.addEventListener('click', () => this.manualImportFromSyncFolder());
                }
            }

            renderStats(period) {
                const now = new Date();
                let startDate;

                if (period === 'today') {
                    startDate = new Date(now);
                    startDate.setHours(0, 0, 0, 0);
                } else if (period === 'week') {
                    startDate = new Date(now);
                    const day = now.getDay();
                    const diff = now.getDate() - day + (day === 0 ? -6 : 1);
                    startDate.setDate(diff);
                    startDate.setHours(0, 0, 0, 0);
                } else if (period === 'month') {
                    startDate = new Date(now);
                    startDate.setDate(startDate.getDate() - 29);
                    startDate.setHours(0, 0, 0, 0);
                }

                const startDateStr = localDateStr(startDate);

                // 分離非連續與有時間的任務（含壓縮任務）
                const allCompleted = this.tasks.filter(t => {
                    if (!t.completed) return false;
                    const d = t.completedDate || (t.completedAt ? t.completedAt.split('T')[0] : null);
                    return d && d >= startDateStr;
                });

                const nonContinuousTasks = allCompleted.filter(t => t.estimatedTime === 'non-continuous');
                const timedTasks         = allCompleted.filter(t => t.estimatedTime !== 'non-continuous');

                // 統一計算統計（壓縮任務已預存 plannedTime/actualTime，與一般任務同路徑）
                const stats = { plannedTime: 0, actualTime: 0, tasks: [] };

                timedTasks.forEach(task => {
                    const planned  = task.plannedTime ?? getTaskPlannedMinutes(task);
                    const actual   = task.actualTime  ?? planned;
                    const tb       = task.timeBalance ?? this.calcTimeBalance(task, actual);
                    stats.plannedTime += planned;
                    stats.actualTime  += actual;
                    stats.tasks.push({ ...task, plannedTime: planned, actualTime: actual, timeBalance: tb });
                });

                // 時間收支總計（含壓縮任務 timeBalance）
                let totalTimeBalance = 0;
                stats.tasks.forEach(t => {
                    const tb = t.timeBalance ?? null;
                    if (tb !== null) totalTimeBalance += tb;
                });

                // 更新摘要
                document.getElementById('totalPlanned').textContent = stats.plannedTime + '分';
                document.getElementById('totalActual').textContent = stats.actualTime + '分';
                document.getElementById('totalDiff').textContent = `${totalTimeBalance > 0 ? '+' : ''}${totalTimeBalance}分`;

                // 渲染表格
                const statsTable = document.getElementById('statsTable');
                const ncEl = document.getElementById('nonContinuousCount');
                if (stats.tasks.length === 0 && nonContinuousTasks.length === 0) {
                    statsTable.innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">暫無完成任務</div>';
                    ncEl.textContent = '';
                    document.getElementById('categoryBreakdown').innerHTML = '';
                    document.getElementById('dailyTrendChart').innerHTML = '';
                    return;
                }

                let tableHtml = `
                    <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--bg-tertiary);">
                                <th style="text-align: left; padding: 8px;">任務</th>
                                <th style="text-align: right; padding: 8px;">預計</th>
                                <th style="text-align: right; padding: 8px;">實際</th>
                                <th style="text-align: right; padding: 8px;">時間收支</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                stats.tasks.forEach(task => {
                    const tb = task.timeBalance ?? null;
                    const diffStyle = (tb !== null && tb < 0) ? 'color: #ff6b6b;' : 'color: #51cf66;';
                    const typeMap = { accumulative: '📈', goal: '🎯', ahead: '⏭️' };
                    const typeLabel = task.taskType ? (typeMap[task.taskType] || '') : '';
                    const ledgerLabel = (() => {
                        if (tb === null || tb === undefined) return '';
                        if (tb > 0) return `賺得 ${tb} 分`;
                        if (tb < 0) return `延遲 ${Math.abs(tb)} 分`;
                        return '';
                    })();
                    const plannedDisplay = task.plannedTime != null ? task.plannedTime + '分' : '—';
                    const actualDisplay  = task.actualTime  != null ? task.actualTime  + '分' : '—';
                    const diffDisplay    = tb !== null ? `${tb > 0 ? '+' : ''}${tb}分` : '—';
                    tableHtml += `
                        <tr style="border-bottom: 1px solid var(--bg-tertiary);">
                            <td style="padding: 8px;">${typeLabel ? `<span>${typeLabel} </span>` : ''}${this.escapeHtml(task.title)}${ledgerLabel ? `<br><span style="font-size:0.75rem;color:var(--text-secondary);">${ledgerLabel}</span>` : ''}</td>
                            <td style="text-align: right; padding: 8px;">${plannedDisplay}</td>
                            <td style="text-align: right; padding: 8px;">${actualDisplay}</td>
                            <td style="text-align: right; padding: 8px; ${diffStyle}">${diffDisplay}</td>
                        </tr>
                    `;
                });

                tableHtml += '</tbody></table>';
                if (period === 'today') {
                    statsTable.innerHTML = tableHtml;
                    ncEl.textContent = nonContinuousTasks.length > 0
                        ? `另有 ${nonContinuousTasks.length} 個非連續任務已完成（未計入時間統計）`
                        : '';
                } else {
                    statsTable.innerHTML = '';
                    ncEl.textContent = '';
                }

                // 分類分析（2個以上分類才顯示）
                const byCategory = {};
                stats.tasks.forEach(t => {
                    if (!byCategory[t.category]) byCategory[t.category] = { planned: 0, actual: 0, timeBalance: 0, count: 0 };
                    byCategory[t.category].planned    += (t.plannedTime  || 0);
                    byCategory[t.category].actual     += (t.actualTime   || 0);
                    byCategory[t.category].timeBalance += (t.timeBalance ?? 0);
                    byCategory[t.category].count++;
                });

                const catEl = document.getElementById('categoryBreakdown');
                const catKeys = Object.keys(byCategory);
                if (catKeys.length >= 2) {
                    let catHtml = `<div style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:8px;">分類分析</div>
                        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(130px,1fr)); gap:8px;">`;
                    catKeys.forEach(cat => {
                        const d = byCategory[cat];
                        const catTb = d.timeBalance;
                        const diffColor = catTb >= 0 ? '#51cf66' : '#ff6b6b';
                        catHtml += `<div style="background:var(--bg-tertiary);padding:10px;border-radius:6px;text-align:center;">
                            <div style="font-weight:600;margin-bottom:4px;">${CATEGORY_META[cat] ? `${CATEGORY_META[cat].emoji} ${CATEGORY_META[cat].label}` : cat}</div>
                            <div style="font-size:0.8rem;color:var(--text-secondary);">${d.count} 個任務</div>
                            <div style="font-size:0.8rem;">${d.planned}分 → ${d.actual}分</div>
                            <div style="font-size:0.8rem;color:${diffColor};">${catTb >= 0 ? '+' : ''}${catTb}分（時間收支）</div>
                        </div>`;
                    });
                    catHtml += '</div>';
                    catEl.innerHTML = catHtml;
                } else {
                    catEl.innerHTML = '';
                }

                // 每日趨勢圖（本週／本月模式）：預定時間／實際時間折線圖，日期名稱融入當日提前/準時/超時 emoji
                const trendEl = document.getElementById('dailyTrendChart');
                if (period === 'week' || period === 'month') {
                    const dayStats = {};
                    stats.tasks.forEach(t => {
                        const day = t.completedDate || (t.completedAt ? t.completedAt.split('T')[0] : null);
                        if (!day) return;
                        if (!dayStats[day]) dayStats[day] = { actual: 0, planned: 0 };
                        dayStats[day].actual  += (t.actualTime  || 0);
                        dayStats[day].planned += (t.plannedTime || 0);
                    });

                    const days = period === 'week' ? 7 : 30;
                    const today = new Date();
                    const dayLabels = [];
                    const dailyPlanned = [];
                    const dailyActual = [];

                    for (let i = days - 1; i >= 0; i--) {
                        const d = new Date(today);
                        d.setDate(d.getDate() - i);
                        const key = localDateStr(d);
                        const ds = dayStats[key];
                        const planned = ds ? ds.planned : 0;
                        const actual = ds ? ds.actual : 0;
                        const symbol = (ds && ds.planned > 0) ? getTimingSymbol(ds.actual - ds.planned) : '';
                        dayLabels.push({
                            date: `${d.getMonth() + 1}/${d.getDate()}`,
                            symbol,
                            planned,
                            actual,
                        });
                        dailyPlanned.push(planned);
                        dailyActual.push(actual);
                    }

                    const maxVal = Math.max(...dailyPlanned, ...dailyActual, 1);
                    const chartW = 700, chartH = 200;
                    const padL = 10, padR = 10, padTop = 14, padBottom = 30;
                    const plotW = chartW - padL - padR, plotH = chartH - padTop - padBottom;
                    const stepX = plotW / (days - 1);
                    const xAt = i => padL + i * stepX;
                    const yAt = v => padTop + (1 - v / maxVal) * plotH;

                    const toPoints = arr => arr.map((v, i) => `${xAt(i)},${yAt(v)}`).join(' ');
                    const plannedColor = '#51cf66';
                    const actualColor = '#ff6b6b';

                    const toCircles = (arr, color, label) => arr.map((v, i) => `
                        <circle cx="${xAt(i)}" cy="${yAt(v)}" r="3.5" fill="${color}">
                            <title>${dayLabels[i].date}${label}：${v}分</title>
                        </circle>`).join('');

                    // 30天模式下每點都有標籤會太擠，僅每 4 天顯示一次日期文字（首尾必顯示）
                    const labelStep = period === 'month' ? 4 : 1;
                    const xLabels = dayLabels.map((dl, i) => {
                        if (i % labelStep !== 0 && i !== days - 1) return '';
                        const text = dl.symbol ? `${dl.date} ${dl.symbol}` : dl.date;
                        return `<text x="${xAt(i)}" y="${chartH - 8}" font-size="${period === 'month' ? 10 : 12}" fill="var(--text-secondary)" text-anchor="middle">${text}</text>`;
                    }).join('');

                    let trendHtml = `<div style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:8px;">每日預定／實際時間（分鐘）</div>
                        <svg viewBox="0 0 ${chartW} ${chartH}" style="width:100%; height:auto; display:block;">
                            <line x1="${padL}" y1="${padTop + plotH}" x2="${chartW - padR}" y2="${padTop + plotH}" stroke="var(--text-secondary)" stroke-opacity="0.3" stroke-width="1"></line>
                            <polyline points="${toPoints(dailyPlanned)}" fill="none" stroke="${plannedColor}" stroke-width="2"></polyline>
                            <polyline points="${toPoints(dailyActual)}" fill="none" stroke="${actualColor}" stroke-width="2"></polyline>
                            ${toCircles(dailyPlanned, plannedColor, '預定')}
                            ${toCircles(dailyActual, actualColor, '實際')}
                            ${xLabels}
                        </svg>`;

                    trendHtml += `<div style="margin-top:6px; font-size:0.72rem; color:var(--text-secondary);">
                        <span style="color:${plannedColor};">●</span> 預定時間&nbsp;&nbsp;
                        <span style="color:${actualColor};">●</span> 實際時間&nbsp;&nbsp;
                        ⏩ 提前完成&nbsp;&nbsp;✅ 準時&nbsp;&nbsp;⚠️ 超時
                    </div>`;
                    trendEl.innerHTML = trendHtml;
                } else {
                    trendEl.innerHTML = '';
                }
            }

            duplicateTask(taskId) {
                const originalTask = this.getTaskById(taskId);
                if (!originalTask) return;

                const newTask = {
                    ...JSON.parse(JSON.stringify(originalTask)),
                    id: Date.now().toString(),
                    title: `${originalTask.title} (副本)`,
                    completed: false,
                    completedAt: null,
                    order: this.tasks.length
                };

                this.tasks.push(newTask);
                this.saveToStorage();
                this.updateUI();
            }

            saveTask() {
                const title = document.getElementById('taskTitle').value.trim();
                if (!title) {
                    alert('請輸入任務名稱');
                    return;
                }

                // 處理日期
                const dateMode = document.querySelector('input[name="dateMode"]:checked').value;
                let date = '';
                if (dateMode === 'scheduled') {
                    date = document.getElementById('taskDate').value;
                } else if (dateMode === 'unlimited') {
                    date = '9999-12-31'; // 標記為不限期
                }
                // 未排程 (unscheduled) 時 date 保持為空字符串

                const estimatedTime = document.querySelector('input[name="estimatedTime"]:checked').value;
                let blocks = null;
                if (estimatedTime === '30plus') {
                    blocks = parseInt(document.getElementById('blockSelect').value);
                }

                const taskData = {
                    title,
                    description: document.getElementById('taskDescription').value.trim(),
                    date: date,
                    estimatedTime: estimatedTime,
                    blocks: blocks,
                    completedBlocks: 0,
                    blockTimes: [],
                    category: document.querySelector('input[name="category"]:checked').value,
                    taskType: document.querySelector('input[name="taskType"]:checked')?.value || 'goal',
                    tags: Array.from(document.querySelectorAll('.tag-checkbox:checked')).map(el => el.value),
                    recurring: null,
                    groupId: null,
                    groupOrder: null,
                    actualTime: document.getElementById('actualTime').value ? parseInt(document.getElementById('actualTime').value) : null,
                    nextStepNotes: null,
                    pinned: document.querySelector('input[name="pinned"]:checked')?.value || null
                };

                if (document.getElementById('taskRecurring').checked) {
                    taskData.recurring = {
                        enabled: true,
                        interval: parseInt(document.getElementById('recurringDays').value),
                        untilDate: document.getElementById('recurringUntilDate').value || null,
                        repeatCount: parseInt(document.getElementById('recurringCount').value) || null
                    };
                }

                if (document.getElementById('taskGroup').checked) {
                    const groupSelect = document.getElementById('groupSelect').value;
                    let groupId;
                    let groupName;

                    if (groupSelect) {
                        // 使用既有群組
                        groupId = groupSelect;
                        const existingTask = this.tasks.find(t => t.groupId === groupId);
                        groupName = existingTask ? existingTask.groupName : groupId;
                    } else {
                        // 建立新群組
                        groupName = document.getElementById('newGroupName').value.trim();
                        groupId = groupName;
                        if (!groupName) {
                            alert('請輸入群組名稱或選擇既有群組');
                            return;
                        }
                    }

                    taskData.groupId = groupId;
                    taskData.groupName = groupName;
                    taskData.groupCycleMode = document.querySelector('input[name="groupCycleMode"]:checked')?.value || 'uniform';
                    taskData.groupDelayMode = document.querySelector('input[name="groupDelayMode"]:checked')?.value || 'fixed';
                    // 編輯既有任務且群組未更換時，保留原本的 groupOrder；其餘情況排到最後
                    if (this.currentEditingTask && this.currentEditingTask.groupId === groupId) {
                        taskData.groupOrder = this.currentEditingTask.groupOrder;
                    } else {
                        const groupTasks = this.tasks.filter(t => t.groupId === groupId && t.id !== this.currentEditingTask?.id);
                        const maxOrder = groupTasks.length > 0 ? Math.max(...groupTasks.map(t => t.groupOrder || 1)) : 0;
                        taskData.groupOrder = maxOrder + 1;
                    }
                }

                if (this.currentEditingTask) {
                    // 編輯時保留已完成的 blocks 和已花費時間
                    if (!blocks) {
                        taskData.completedBlocks = 0;
                        taskData.blockTimes = [];
                    } else {
                        const prevCompleted = this.currentEditingTask.completedBlocks || 0;
                        const prevBlockTimes = this.currentEditingTask.blockTimes || [];
                        if (blocks < prevCompleted) {
                            if (confirm(`新的 block 數 (${blocks}) 少於已完成的 block 數 (${prevCompleted})，是否取消編輯？`)) {
                                return;
                            }
                            taskData.completedBlocks = blocks;
                            taskData.blockTimes = prevBlockTimes.slice(0, blocks);
                        } else {
                            taskData.completedBlocks = prevCompleted;
                            taskData.blockTimes = prevBlockTimes;
                        }
                    }

                    // 保留或更新「下一步建議」
                    const editNextStepNotes = document.getElementById('editNextStepNotes');
                    if (editNextStepNotes && editNextStepNotes.style.display !== 'none') {
                        taskData.nextStepNotes = editNextStepNotes.value.trim() || null;
                    } else {
                        taskData.nextStepNotes = this.currentEditingTask.nextStepNotes || null;
                    }

                    this.updateTask(this.currentEditingTask.id, taskData);
                    this.showNotification('✅ 任務已更新');
                } else {
                    this.addTask(taskData);
                    this.showNotification('✅ 任務已添加');
                }

                // 群組週期模式：廣播到同群組所有任務；統一模式下同步間隔天數
                if (taskData.groupId) {
                    this.tasks.forEach(t => {
                        if (t.groupId === taskData.groupId) {
                            t.groupCycleMode = taskData.groupCycleMode;
                            t.groupDelayMode = taskData.groupDelayMode;
                            if (taskData.groupCycleMode === 'uniform' && t.recurring && taskData.recurring) {
                                t.recurring.interval = taskData.recurring.interval;
                            }
                        }
                    });
                }

                // 如果是群組任務，自動計算日期
                if (taskData.groupId && taskData.recurring && taskData.recurring.enabled) {
                    this.updateGroupTaskDates(taskData.groupId);
                }

                this.updateUI();
            }

            getGroupsList() {
                const groups = {};
                this.tasks.forEach(task => {
                    if (task.recurring && task.recurring.enabled && task.groupId) {
                        if (!groups[task.groupId]) {
                            groups[task.groupId] = {
                                groupId: task.groupId,
                                name: task.groupName || task.groupId,
                                tasks: [],
                                activeTasks: 0
                            };
                        }
                        groups[task.groupId].tasks.push(task);
                        if (!task.completed) groups[task.groupId].activeTasks++;
                    }
                });
                return Object.values(groups);
            }

            updateGroupTaskDates(groupId) {
                // 只重算未完成的任務，已完成任務保留原日期作為歷史記錄
                const activeTasks = this.tasks
                    .filter(t => t.groupId === groupId && !t.completed && t.recurring && t.recurring.enabled)
                    .sort((a, b) => (a.groupOrder ?? 0) - (b.groupOrder ?? 0));

                if (activeTasks.length === 0) return;

                // 基準日期取所有活躍任務中最早的有效日期（不受當前排列順序影響）
                // 這確保每次拖曳重排只是重新分配固定時間槽，不會讓日期不斷往後推移
                const validDates = activeTasks
                    .map(t => t.date)
                    .filter(d => d && d !== '9999-12-31')
                    .sort();

                if (validDates.length === 0) return;

                const baseDate = new Date(validDates[0]);
                const cycleMode = activeTasks[0].groupCycleMode || 'uniform';

                if (cycleMode === 'individual') {
                    // 個別設定：每個任務的間隔天數表示到下一個任務的天數，依序累加排程
                    let cursor = new Date(baseDate);
                    activeTasks.forEach(task => {
                        task.date = localDateStr(cursor);
                        cursor.setDate(cursor.getDate() + (task.recurring.interval || 1));
                    });
                } else {
                    // 統一：所有任務共用同一間隔天數
                    const interval = activeTasks[0].recurring.interval;
                    activeTasks.forEach((task, index) => {
                        const newDate = new Date(baseDate);
                        newDate.setDate(newDate.getDate() + index * interval);
                        task.date = localDateStr(newDate);
                    });
                }

                this.saveToStorage();
            }

            renderGroups() {
                const container = document.getElementById('groupContainer');
                if (!container) return;

                const filterList = container.querySelector('.filter-list');
                filterList.innerHTML = '';

                const groups = this.getGroupsList();
                if (groups.length === 0) {
                    container.style.display = 'none';
                    return;
                }
                container.style.display = '';

                groups.forEach(group => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-item';
                    if (this.currentFilter === `group:${group.groupId}`) {
                        btn.classList.add('active');
                    }
                    btn.innerHTML = `<span class="filter-icon">🔁</span>${this.escapeHtml(group.name)}`;
                    btn.dataset.filter = `group:${group.groupId}`;
                    btn.onclick = () => {
                        document.querySelectorAll('.filter-item').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.currentFilter = `group:${group.groupId}`;
                        this.renderTasks();
                    };
                    filterList.appendChild(btn);
                });
            }

        }  // ✅ 關閉 TodoApp 類

        // ===== 全局函數 =====
        let app;

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.remove('active');
        }

        // 關閉模態框（點擊外部）
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            app = new TodoApp();
        });
    </script>
    <script>
    // Android 降級：File System Access API 不支援時隱藏同步資料夾 UI
    (function() {
      if (typeof window.showOpenFilePicker === 'function') return;
      document.addEventListener('DOMContentLoaded', function() {
        const syncBtn = document.getElementById('setSyncFolderBtn');
        if (!syncBtn) return;
        const notice = document.createElement('div');
        notice.style.cssText = 'font-size:0.78rem;color:var(--text-secondary);padding:6px 0 10px;line-height:1.6;';
        notice.textContent = '📱 行動裝置不支援資料夾同步，請使用下方手動備份。';
        syncBtn.parentElement.insertBefore(notice, syncBtn);
        syncBtn.style.display = 'none';
      });
    })();
    </script>
</body>
